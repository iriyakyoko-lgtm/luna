<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>루나 · 미니게임</title>
  <link rel="icon" type="image/jpeg" href="https://profile.img.sooplive.co.kr/LOGO/lt/ltg8022/ltg8022.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Noto+Sans+KR:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <style>
    .lg-top{display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:14px;}
    .lg-count{display:flex; align-items:center; gap:12px; font-size:14px; font-weight:700; color:var(--text);}
    .lg-count button{width:36px; height:36px; border-radius:50%; border:1.5px solid var(--main); background:var(--card); color:var(--main-dark); font-size:18px; font-weight:800; cursor:pointer; font-family:inherit;}
    .lg-count button:hover{background:var(--main-light);}
    .lg-count b{font-size:20px; min-width:30px; text-align:center; color:var(--main-dark);}
    .lg-btn{border:none; cursor:pointer; border-radius:999px; padding:12px 24px; font-size:15px; font-weight:800; font-family:inherit; background:var(--main); color:#fff; transition:transform .15s ease;}
    .lg-btn:hover{transform:translateY(-2px);}
    .lg-btn.ghost{background:var(--main-light); color:var(--main-dark);}
    body.dark .lg-btn{background:var(--main); color:#0B0C22;}
    body.dark .lg-btn.ghost{background:var(--main-light); color:var(--main-dark);}
    .lg-hint{font-size:12.5px; color:var(--text-soft); margin-bottom:6px;}
    .lg-stage{position:relative; margin-top:4px;}
    .lg-row{position:relative; height:60px;}
    .lg-av{position:absolute; transform:translateX(-50%); width:50px; height:50px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      border:3px solid; background:#fff; cursor:default; transition:transform .15s ease, opacity .2s ease;
      box-shadow:0 4px 10px rgba(32,30,80,.2); padding:0; font-family:inherit;}
    body.dark .lg-av{background:var(--card);}
    .lg-av img{width:82%; height:82%; object-fit:contain; display:block; pointer-events:none;}
    .lg-av.clickable{cursor:pointer;}
    .lg-av.clickable:hover{transform:translateX(-50%) scale(1.14);}
    .lg-av.done{opacity:.35;}
    .lg-runner{position:absolute; width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center;
      border:3px solid; background:#fff; z-index:5; pointer-events:none; transform:translate(-50%,-50%);
      box-shadow:0 5px 12px rgba(0,0,0,.22);}
    body.dark .lg-runner{background:var(--card);}
    .lg-runner img{width:82%; height:82%; object-fit:contain;}
    #lgCanvas{display:block; width:100%;}
    .lg-res{position:absolute; transform:translateX(-50%); width:88px;}
    .lg-res input{width:100%; box-sizing:border-box; text-align:center; padding:9px 6px; border-radius:12px;
      border:1.5px solid var(--main-light); background:#fff; color:var(--text); font-size:13px; font-weight:700; font-family:inherit; outline:none;}
    body.dark .lg-res input{background:var(--card); border-color:rgba(170,175,250,.3);}
    .lg-res input:focus{border-color:var(--main);}
    .lg-res .mask{display:block; text-align:center; padding:9px 6px; border-radius:12px; background:var(--main-light);
      color:var(--main-dark); font-size:14px; font-weight:800; transition:all .2s ease;}
    .lg-res .mask.open{background:#fff; border:1.5px solid; box-shadow:0 6px 14px rgba(32,30,80,.22); transform:scale(1.08);}
    body.dark .lg-res .mask.open{background:var(--card);}
    .lg-log{margin-top:16px; display:flex; flex-direction:column; gap:6px;}
    .lg-log div{display:flex; align-items:center; gap:9px; font-size:14px; font-weight:700; color:var(--text); background:var(--main-light); border-radius:10px; padding:8px 14px;}
    .lg-log img{width:24px; height:24px; object-fit:contain;}
    .lg-name{position:absolute; transform:translateX(-50%); width:86px; top:58px;}
    .lg-name input{width:100%; box-sizing:border-box; text-align:center; padding:6px 4px; border-radius:10px;
      border:1.5px solid var(--main-light); background:#fff; color:var(--text); font-size:12px; font-weight:700; font-family:inherit; outline:none;}
    body.dark .lg-name input{background:var(--card); border-color:rgba(170,175,250,.3);}
    .lg-name input:focus{border-color:var(--main);}
    .lg-name .nm{display:block; text-align:center; font-size:12.5px; font-weight:800; color:var(--text);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
    .game-tabs{display:flex; justify-content:center; gap:10px; margin:2px 0 16px;}
    .game-tab{border:1.5px solid var(--main-light); background:var(--card); color:var(--text-soft);
      border-radius:999px; padding:10px 22px; font-size:14.5px; font-weight:800; cursor:pointer; font-family:inherit; transition:all .18s ease;}
    .game-tab.on{background:var(--main); border-color:transparent; color:#fff; box-shadow:0 6px 16px rgba(32,30,80,.28);}

    /* ── 제비뽑기 (컵에서 막대 뽑기) ── */
    .jb-set{display:flex; align-items:center; gap:22px; flex-wrap:wrap;}
    .jb-stage{display:flex; justify-content:center; padding:168px 0 14px; overflow-x:auto;}
    .jb-scene{position:relative; display:inline-flex; flex-direction:column; align-items:stretch;}
    .jb-cup .jb-gob{position:absolute; right:6px; bottom:3px; width:64px; transform:rotate(4deg);
      filter:drop-shadow(0 5px 9px rgba(32,30,80,.35)); pointer-events:none;}
    .jb-sticks{position:relative; display:flex; gap:32px; padding:0 36px; align-items:flex-end; height:176px; z-index:1; justify-content:center;}
    .jb-stick{position:relative; width:22px; height:172px; background:none; border:none; padding:0; cursor:pointer; font-family:inherit;
      transform:translateY(0) rotate(var(--rot,0deg));
      transition:transform .78s cubic-bezier(.35,.05,.25,1.22);
      animation:jbRise .5s cubic-bezier(.3,1.2,.5,1) backwards;}
    @keyframes jbRise{from{opacity:0; transform:translateY(48px) rotate(var(--rot,0deg));}}
    .jb-stick:not(.out):not(.wig):hover{transform:translateY(-11px) rotate(var(--rot,0deg));}
    .jb-stick.wig{animation:jbWig .32s ease;}
    @keyframes jbWig{25%{transform:translateY(-5px) rotate(-3.5deg)}60%{transform:translateY(-9px) rotate(3deg)}100%{transform:translateY(-11px) rotate(0deg)}}
    .jb-stick.out{transform:translateY(-132px) rotate(0deg); cursor:default; z-index:5;}
    .jb-stick .bar{position:absolute; left:50%; transform:translateX(-50%); bottom:0; width:15px; height:100%;
      border-radius:8px 8px 6px 6px;
      background:linear-gradient(90deg,#C9CCF7,#A8ADEE 55%,#8189DC);
      box-shadow:inset -2px 0 2px rgba(0,0,0,.14), inset 2px 0 2px rgba(255,255,255,.45);}
    .jb-stick .cap{position:absolute; top:-27px; left:50%; transform:translateX(-50%); width:48px; height:48px; border-radius:50%;
      background:#fff; border:2px solid var(--main-light); display:flex; align-items:center; justify-content:center;
      box-shadow:0 3px 7px rgba(32,30,80,.28);}
    body.dark .jb-stick .cap{background:var(--card); border-color:#2E3268;}
    .jb-stick .cap img{width:88%; height:88%; object-fit:contain; display:block;}
    .jb-stick .cap .win-b{position:absolute; right:-6px; bottom:-4px; font-size:17px; filter:drop-shadow(0 2px 3px rgba(0,0,0,.25));}
    .jb-stick .no{position:absolute; top:26px; left:50%; transform:translateX(-50%); font-size:9.5px; font-weight:800; color:#3B3FA8; font-style:normal;}
    .jb-stick .tip{position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:15px; height:40px;
      border-radius:2px 2px 6px 6px; opacity:0; transition:opacity .25s ease .35s;}
    .jb-stick.out .tip{opacity:1;}
    .tip.win{background:linear-gradient(#FFE39A,#E0A93B); box-shadow:0 0 14px rgba(224,169,59,.65);}
    .tip.lose{background:linear-gradient(#B8BBE4,#8E93C4);}
    .jb-toastwrap{height:52px; display:flex; justify-content:center; align-items:center;}
    .jb-toast{opacity:0; transform:scale(.55); transition:all .3s cubic-bezier(.3,1.4,.5,1);
      background:#fff; border:2px solid; border-radius:999px; padding:10px 24px; font-size:16px; font-weight:800;
      box-shadow:0 10px 24px rgba(32,30,80,.22); white-space:nowrap;}
    body.dark .jb-toast{background:var(--card);}
    .jb-toast.show{opacity:1; transform:scale(1);}
    .jb-toast.win{border-color:#E0A93B; color:#A9761B; font-size:17.5px;}
    body.dark .jb-toast.win{color:#F0C463;}
    .jb-toast.lose{border-color:#A8ADEE; color:#6266A0; font-size:17px;}
    .jb-cup{position:relative; z-index:3; height:96px; margin-top:-92px; border-radius:16px 16px 30px 30px;
      background:linear-gradient(#3B3FA8,#232059);
      box-shadow:inset 0 10px 0 rgba(255,255,255,.13), inset 0 -8px 14px rgba(0,0,0,.25), 0 12px 24px rgba(32,30,80,.28);}
    .jb-cup::before{content:''; position:absolute; top:0; left:0; right:0; height:13px;
      border-radius:16px 16px 46% 46%; background:rgba(8,8,30,.3);}
    .jb-cup::after{content:'🌙 루나의 제비뽑기 🌙'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      color:#E9EAFF; font-size:13.5px; font-weight:800; letter-spacing:2px;}

    /* ── 뽑기(가챠) ── */
    .gc-stage{position:relative; display:flex; justify-content:center; padding:16px 0 10px;}
    .gc-machine{position:relative; width:min(360px, 92vw);}
    .gc-art{display:block; width:100%; height:auto; filter:drop-shadow(0 14px 26px rgba(32,30,80,.22));}
    .gc-machine.shake{animation:gcShakeA .55s ease;}
    @keyframes gcShakeA{20%{transform:translate(-3px,1px) rotate(-.7deg)}50%{transform:translate(3px,-1px) rotate(.7deg)}80%{transform:translate(-2px,0)}}
    .gc-knob{position:absolute; left:41.5%; top:72.5%; width:15%; aspect-ratio:1;
      transform:translate(-50%,-50%); border:none; background:none; padding:0; cursor:pointer; border-radius:50%;}
    .gc-knob::after{content:''; position:absolute; inset:-6px; border-radius:50%; border:2px dashed rgba(255,255,255,.0); transition:all .2s;}
    .gc-knob:hover::after{border-color:rgba(255,255,255,.8); box-shadow:0 0 16px rgba(255,255,255,.55);}
    .gc-knob:disabled{cursor:default;}
    .gc-knob:disabled::after{border-color:transparent; box-shadow:none;}
    .gc-knob.spin{animation:gcSpinA .95s cubic-bezier(.45,.1,.3,1);}
    @keyframes gcSpinA{to{transform:translate(-50%,-50%) rotate(540deg);}}
    .gc-turn{margin-top:6px; font-size:12px; font-weight:800; color:var(--text-soft); text-align:center;}
    .gc-ballwrap{position:absolute; inset:0; pointer-events:none; z-index:8;}
    .gc-ball{position:absolute; left:41%; bottom:11%; width:56px; pointer-events:auto; cursor:pointer;
      transform:translateX(-50%); filter:drop-shadow(0 8px 14px rgba(32,30,80,.3));}
    .gc-ball.pop{animation:gcPop .7s cubic-bezier(.35,.1,.3,1) forwards;}
    @keyframes gcPop{
      0%{transform:translateX(-50%) translateY(6px) scale(.4); opacity:0;}
      35%{transform:translateX(-50%) translateY(34px) scale(.85); opacity:1;}
      60%{transform:translateX(-50%) translateY(22px) scale(.9);}
      100%{transform:translateX(-50%) translateY(34px) scale(.9);}
    }
    .gc-ball.grow{transition:all .75s cubic-bezier(.4,.1,.25,1.15);}
    .gc-ball .half{position:absolute; left:0; width:100%; transition:all .6s cubic-bezier(.5,.05,.3,1);}
    .gc-ball .h-top{top:0; z-index:2;}
    .gc-ball .h-bot{bottom:0;}
    .gc-ball.open .h-top{transform:translateY(-58%) rotate(-16deg); opacity:.92;}
    .gc-ball .prize{position:absolute; left:50%; top:46%; transform:translate(-50%,-50%) scale(0); z-index:1;
      transition:transform .45s cubic-bezier(.3,1.5,.5,1) .28s; text-align:center; white-space:nowrap;}
    .gc-ball.open .prize{transform:translate(-50%,-50%) scale(1);}
    .prize .pt{display:inline-block; background:#fff; border:2px solid; border-radius:999px; padding:8px 18px; font-size:15px; font-weight:800; max-width:210px; white-space:normal; line-height:1.35;}
    body.dark .prize .pt{background:var(--card);}
    .prize.g0 .pt{border-color:#A8ADEE; color:#6266A0;}
    .prize.g1 .pt{border-color:var(--main); color:var(--main-dark); box-shadow:0 8px 18px rgba(106,111,224,.28);}
    .prize.g2 .pt{border-color:#E0A93B; color:#A9761B; box-shadow:0 8px 20px rgba(224,169,59,.4);}
    body.dark .prize.g2 .pt{color:#F0C463;}
    .gc-grades{display:flex; flex-wrap:wrap; gap:12px; margin:10px 0 8px;}
    .gc-grade{flex:1 1 250px; display:flex; align-items:center; gap:11px; background:var(--main-light); border-radius:14px; padding:10px 13px;}
    .gc-grade>img{width:48px; height:48px; object-fit:contain; filter:drop-shadow(0 3px 5px rgba(32,30,80,.22));}
    .gg-body{flex:1;}
    .gg-name{font-size:12px; font-weight:800; margin-bottom:5px; color:var(--text-soft); letter-spacing:.5px;}
    .gc-grade.g1 .gg-name{color:var(--main-dark);}
    .gc-grade.g2 .gg-name{color:#B8860B;}
    .gg-row{display:flex; gap:8px; align-items:center; font-size:12px; font-weight:700; color:var(--text-soft);}
    .gg-cnt{width:58px; text-align:center; padding:7px 4px; border-radius:10px; border:1.5px solid rgba(106,111,224,.3); background:#fff; font-family:inherit; font-size:14px; font-weight:800; color:var(--text);}
    .gg-prz{flex:1; min-width:100px; padding:7px 11px; border-radius:10px; border:1.5px solid rgba(106,111,224,.3); background:#fff; font-family:inherit; font-size:13px; font-weight:600; color:var(--text);}
    body.dark .gg-cnt, body.dark .gg-prz{background:var(--card); border-color:rgba(170,175,250,.3);}
    .gc-grades.lock input{opacity:.55; pointer-events:none;}
    @media (max-width:640px){
      .lg-res{width:64px;} .lg-res input,.lg-res .mask{font-size:11.5px; padding:8px 3px;}
      .lg-av{width:40px; height:40px;}
      .jb-sticks{gap:20px; padding:0 26px;} .jb-stage{padding-top:160px;} .jb-cup .jb-gob{width:50px; right:4px;} .jb-stick .cap{width:40px; height:40px; top:-23px;}
    }
  </style>
</head>

<div class="container stagger">
  <div class="ohd"><i></i><span class="dm">✦</span>MINI GAME<span class="dm">✦</span><i></i></div>
  <div class="game-tabs">
    <button class="game-tab on" type="button" id="tabbtn-ladder" onclick="switchGame('ladder')">🌙 사다리타기</button>
    <button class="game-tab" type="button" id="tabbtn-lots" onclick="switchGame('lots')">✦ 제비뽑기</button>
    <button class="game-tab" type="button" id="tabbtn-gacha" onclick="switchGame('gacha')">🔮 뽑기</button>
  </div>

  <div class="card" id="game-ladder">
    <div class="lg-top">
      <div class="lg-count">인원
        <button type="button" onclick="setN(-1)">−</button><b id="lg-n">4</b><button type="button" onclick="setN(1)">+</button>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="lg-btn ghost" type="button" id="lg-reset" style="display:none" onclick="resetGame()">↺ 다시하기</button>
        <button class="lg-btn ghost" type="button" id="lg-all" style="display:none" onclick="revealAll()">전부 공개</button>
        <button class="lg-btn" type="button" id="lg-start" onclick="startGame()">🌙 시작하기</button>
      </div>
    </div>
    <div class="lg-hint" id="lg-hint">이름과 결과를 적고 시작하기를 누르면, 사다리가 숨겨지고 햇살이를 눌러 타고 내려가요 ✦</div>
    <div class="lg-stage" id="lg-stage">
      <div class="lg-row" id="lg-tops" style="height:96px;"></div>
      <canvas id="lgCanvas"></canvas>
      <div class="lg-row" id="lg-bots" style="height:48px;"></div>
    </div>
    <div class="lg-log" id="lg-log"></div>
  </div>

  <!-- ═══ 제비뽑기 ═══ -->
  <div class="card" id="game-lots" style="display:none">
    <div class="lg-top">
      <div class="jb-set">
        <div class="lg-count">제비
          <button type="button" onclick="jbSetN(-1)">−</button><b id="jb-n">4</b><button type="button" onclick="jbSetN(1)">+</button>
        </div>
        <div class="lg-count">당첨
          <button type="button" onclick="jbSetW(-1)">−</button><b id="jb-w">1</b><button type="button" onclick="jbSetW(1)">+</button>
        </div>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="lg-btn ghost" type="button" id="jb-reset" style="display:none" onclick="jbReset()">↺ 다시하기</button>
        <button class="lg-btn ghost" type="button" id="jb-all" style="display:none" onclick="jbRevealAll()">전부 공개</button>
        <button class="lg-btn" type="button" id="jb-start" onclick="jbStart()">✦ 시작하기</button>
      </div>
    </div>
    <div class="lg-hint" id="jb-hint">제비 개수와 당첨 개수를 정하고 시작하기! 막대를 눌러 뽑아보세요 ✦</div>
    <div class="jb-toastwrap"><div class="jb-toast" id="jb-toast"></div></div>
    <div class="jb-stage" id="jb-stage" style="display:none">
      <div class="jb-scene">
        <div class="jb-sticks" id="jb-sticks"></div>
        <div class="jb-cup"><img class="jb-gob" src="../haessal.png" alt=""></div>
      </div>
    </div>
    <div class="lg-log" id="jb-log"></div>
  </div>

  <!-- ═══ 뽑기(가챠) ═══ -->
  <div class="card" id="game-gacha" style="display:none">
    <div class="lg-top">
      <div class="lg-hint" style="margin:0">등급별 개수(합계 최대 50)와 당첨 품목을 적고 시작! 레버를 돌리면 뽑기알이 나와요 🔮</div>
      <div style="display:flex; gap:8px;">
        <button class="lg-btn ghost" type="button" id="gc-reset" style="display:none" onclick="gcReset()">↺ 다시하기</button>
        <button class="lg-btn" type="button" id="gc-start" onclick="gcStart()">🔮 시작하기</button>
      </div>
    </div>
    <div class="gc-grades" id="gc-grades">
      <div class="gc-grade g0"><img src="../ball_n.png" alt=""><div class="gg-body"><div class="gg-name">일반</div><div class="gg-row"><input type="number" class="gg-cnt" id="gc-c0" value="4" min="0" max="50">개<input type="text" class="gg-prz" id="gc-p0" value="꽝" placeholder="품목"></div></div></div>
      <div class="gc-grade g1"><img src="../ball_r.png" alt=""><div class="gg-body"><div class="gg-name">고급</div><div class="gg-row"><input type="number" class="gg-cnt" id="gc-c1" value="1" min="0" max="50">개<input type="text" class="gg-prz" id="gc-p1" value="스티커 세트" placeholder="품목"></div></div></div>
      <div class="gc-grade g2"><img src="../ball_sr.png" alt=""><div class="gg-body"><div class="gg-name">희귀</div><div class="gg-row"><input type="number" class="gg-cnt" id="gc-c2" value="1" min="0" max="50">개<input type="text" class="gg-prz" id="gc-p2" value="치킨 기프티콘" placeholder="품목"></div></div></div>
    </div>
    <div class="lg-hint" id="gc-hint"></div>
    <div class="gc-stage" id="gc-stage" style="display:none">
      <div>
        <div class="gc-machine">
          <img class="gc-art" src="../gacha_machine.png" alt="루나의 뽑기 기계">
          <button class="gc-knob" id="gc-knob" type="button" onclick="gcSpin()" aria-label="돌리기"></button>
          <div class="gc-ballwrap" id="gc-ballwrap"></div>
        </div>
        <div class="gc-turn">↑ 레버를 눌러 돌려보세요</div>
      </div>
    </div>
    <div class="lg-log" id="gc-log"></div>
  </div>

<script>
/* ═══ 사다리타기 (모요 방식 그대로) ═══ */
const AV='../stamp.png';   /* 참가자 아이콘 = 햇살이 */
const PC=['#6A6FE0','#E0A93B','#D95F9E','#3FAE9E','#8A5FE0','#E06A4F','#4F8FE0','#B08A2F','#5FBF6A','#C05FD9','#3B6FB8','#E0743B'];
const $=id=>document.getElementById(id);
function cssVar(n){ return getComputedStyle(document.body).getPropertyValue(n).trim()||'#3B3FA8'; }

let N=4, phase='setup', G=null, busy=false;
function setN(d){
  if(phase!=='setup') return;
  N=Math.min(10, Math.max(2, N+d)); $('lg-n').textContent=N; renderSetup();
}
function geom(){
  const cv=$('lgCanvas'); const W=cv.clientWidth, H=440;
  const minPad=Math.max(50, W*0.06);
  const colW=Math.min(150, (W-minPad*2)/(N-1));
  const pad=(W - colW*(N-1))/2;
  const rows=(G&&G.rows)||9; const y0=10, y1=H-10, rowH=(y1-y0)/(rows+1);
  return {W,H,pad,colW,y0,y1,rowH,rows};
}
function renderSetup(){
  const keep=[...document.querySelectorAll('#lg-bots .lg-res input')].map(i=>i.value);
  const keepN=(G&&G.rawNames)? G.rawNames.slice() : [...document.querySelectorAll('#lg-tops .lg-name input')].map(i=>i.value);
  const {pad,colW}=geom();
  $('lgCanvas').style.height='440px';
  const tops=$('lg-tops'), bots=$('lg-bots');
  tops.innerHTML=''; bots.innerHTML='';
  for(let i=0;i<N;i++){
    const a=document.createElement('button');
    a.className='lg-av'; a.type='button'; a.id='lg-av-'+i;
    a.innerHTML='<img src="'+AV+'" alt="">';
    a.style.left=(pad+i*colW)+'px'; a.style.top='2px'; a.style.borderColor=PC[i%12];
    tops.appendChild(a);
    const nw=document.createElement('div');
    nw.className='lg-name'; nw.id='lg-name-'+i; nw.style.left=(pad+i*colW)+'px';
    const ni=document.createElement('input');
    ni.placeholder=(i+1)+'번'; ni.value=keepN[i]!==undefined? keepN[i] : '';
    nw.appendChild(ni); tops.appendChild(nw);
    const w=document.createElement('div');
    w.className='lg-res'; w.style.left=(pad+i*colW)+'px'; w.style.top='2px'; w.id='lg-res-'+i;
    const inp=document.createElement('input');
    inp.placeholder='결과'; inp.value = keep[i]!==undefined? keep[i] : (i===0?'당첨 🎁':'꽝');
    w.appendChild(inp); bots.appendChild(w);
  }
  drawBase();
}
function drawBase(){
  const cv=$('lgCanvas');
  const {W,H,pad,colW,y0,y1}=geom();
  const dpr=window.devicePixelRatio||1;
  cv.width=W*dpr; cv.height=H*dpr;
  const c=cv.getContext('2d'); c.setTransform(dpr,0,0,dpr,0,0);
  c.clearRect(0,0,W,H);
  c.lineCap='round'; c.lineWidth=4; c.strokeStyle=cssVar('--main-dark'); c.globalAlpha=.85;
  for(let i=0;i<N;i++){
    const x=pad+i*colW;
    c.beginPath(); c.moveTo(x,y0); c.lineTo(x,y1); c.stroke();
  }
  c.globalAlpha=1;
}
function startGame(){
  if(phase!=='setup') return;
  const rows=9+((Math.random()*3)|0);
  const rung=[];
  for(let g=0; g<N-1; g++){
    rung[g]=[];
    for(let r=0; r<rows; r++) rung[g][r] = Math.random()<0.45 && !(g>0 && rung[g-1][r]);
  }
  for(let g=0; g<N-1; g++) if(!rung[g].some(Boolean)){
    let r=(Math.random()*rows)|0;
    while(g>0 && rung[g-1][r]) r=(r+1)%rows;
    rung[g][r]=true;
  }
  const results=[...document.querySelectorAll('#lg-bots .lg-res input')].map(i=>i.value.trim()||'꽝');
  const rawNames=[...document.querySelectorAll('#lg-tops .lg-name input')].map(i=>i.value);
  const names=rawNames.map((v,i)=>v.trim()||((i+1)+'번'));
  G={rows, rung, results, names, rawNames, done:Array(N).fill(false)};
  for(let i=0;i<N;i++){
    const nw=$('lg-name-'+i); nw.innerHTML='';
    const sp=document.createElement('span'); sp.className='nm'; sp.textContent=names[i]; sp.style.color=PC[i%12];
    nw.appendChild(sp);
  }
  phase='play'; busy=false;
  for(let i=0;i<N;i++){
    const w=$('lg-res-'+i); w.innerHTML='';
    const m=document.createElement('span'); m.className='mask'; m.id='lg-mask-'+i; m.textContent=results[i];
    w.appendChild(m);
    const a=$('lg-av-'+i); a.classList.add('clickable'); a.onclick=()=>run(i,false);
  }
  $('lg-start').style.display='none';
  $('lg-reset').style.display=''; $('lg-all').style.display='';
  $('lg-hint').textContent='햇살이를 눌러보세요! 사다리는 숨겨져 있어서 어디로 갈지 몰라요 ✦';
  drawBase();
}
function resetGame(){
  phase='setup'; G=null; busy=false;
  document.querySelectorAll('.lg-runner').forEach(e=>e.remove());
  $('lg-start').style.display='';
  $('lg-reset').style.display='none'; $('lg-all').style.display='none';
  $('lg-log').innerHTML='';
  $('lg-hint').textContent='이름과 결과를 적고 시작하기를 누르면, 사다리가 숨겨지고 햇살이를 눌러 타고 내려가요 ✦';
  renderSetup();
}
function pathOf(start){
  const {pad,colW,y0,y1,rowH,rows}=geom();
  let col=start; const pts=[[pad+col*colW,y0]];
  for(let r=0;r<rows;r++){
    const y=y0+rowH*(r+1);
    pts.push([pad+col*colW,y]);
    if(col<N-1 && G.rung[col][r]){ col++; pts.push([pad+col*colW,y]); }
    else if(col>0 && G.rung[col-1][r]){ col--; pts.push([pad+col*colW,y]); }
  }
  pts.push([pad+col*colW,y1]);
  return {pts,end:col};
}
function strokePath(c,pts,upto,col){
  c.strokeStyle=col; c.lineWidth=5.5; c.lineCap='round'; c.lineJoin='round';
  c.beginPath(); c.moveTo(pts[0][0],pts[0][1]);
  for(let k=1;k<=upto;k++) c.lineTo(pts[k][0],pts[k][1]);
  c.stroke();
}
function finishRun(i,end,pts){
  G.done[i]=true;
  $('lg-av-'+i).classList.remove('clickable'); $('lg-av-'+i).classList.add('done'); $('lg-av-'+i).onclick=null;
  const m=$('lg-mask-'+end);
  m.textContent=G.results[end]; m.classList.add('open');
  m.style.borderColor=PC[i%12]; m.style.color=PC[i%12];
  const log=document.createElement('div');
  log.innerHTML='<img src="'+AV+'" alt=""> <b>'+G.names[i].replace(/</g,'&lt;')+'</b>  →  '+G.results[end].replace(/</g,'&lt;');
  log.style.borderLeft='4.5px solid '+PC[i%12];
  $('lg-log').appendChild(log);
  if(typeof window.fxHearts==='function'){
    const r=$('lgCanvas').getBoundingClientRect();
    window.fxHearts(r.left+pts[pts.length-1][0], r.top+pts[pts.length-1][1], 8);
  }
}
function run(i, instant){
  if(phase!=='play' || !G || G.done[i] || busy) return;
  const {pts,end}=pathOf(i);
  const cv=$('lgCanvas'), c=cv.getContext('2d');
  if(instant){ strokePath(c,pts,pts.length-1,PC[i%12]); finishRun(i,end,pts); return; }
  busy=true;
  const stage=$('lg-stage'), crect=cv.getBoundingClientRect(), srect=stage.getBoundingClientRect();
  const ox=crect.left-srect.left, oy=crect.top-srect.top;
  const runner=document.createElement('div');
  runner.className='lg-runner'; runner.innerHTML='<img src="'+AV+'" alt="">'; runner.style.borderColor=PC[i%12];
  stage.appendChild(runner);
  const seg=[0];
  for(let k=1;k<pts.length;k++) seg[k]=seg[k-1]+Math.hypot(pts[k][0]-pts[k-1][0], pts[k][1]-pts[k-1][1]);
  const total=seg[seg.length-1], SPEED=470;
  const t0=performance.now();
  (function step(now){
    const dist=Math.min(total, (now-t0)/1000*SPEED);
    let k=1; while(k<seg.length && seg[k]<dist) k++;
    const a=pts[k-1], b=pts[Math.min(k,pts.length-1)];
    const segLen=seg[k]-seg[k-1]||1, t=(dist-seg[k-1])/segLen;
    const x=a[0]+(b[0]-a[0])*t, y=a[1]+(b[1]-a[1])*t;
    drawBase();
    for(let j=0;j<N;j++) if(G.done[j]){ const p=pathOf(j); strokePath(c,p.pts,p.pts.length-1,PC[j%12]); }
    strokePath(c,pts,k-1,PC[i%12]);
    c.strokeStyle=PC[i%12]; c.lineWidth=5.5;
    c.beginPath(); c.moveTo(a[0],a[1]); c.lineTo(x,y); c.stroke();
    runner.style.left=(ox+x)+'px'; runner.style.top=(oy+y)+'px';
    if(dist<total) requestAnimationFrame(step);
    else{ runner.remove(); busy=false; strokePath(c,pts,pts.length-1,PC[i%12]); finishRun(i,end,pts); }
  })(performance.now());
}
function revealAll(){
  if(phase!=='play'||!G||busy) return;
  for(let i=0;i<N;i++) if(!G.done[i]) run(i,true);
}
function repaint(){
  if(phase==='setup'){ renderSetup(); return; }
  const {pad,colW}=geom();
  for(let i=0;i<N;i++){
    $('lg-av-'+i).style.left=(pad+i*colW)+'px';
    $('lg-name-'+i).style.left=(pad+i*colW)+'px';
    $('lg-res-'+i).style.left=(pad+i*colW)+'px';
  }
  drawBase();
  const c=$('lgCanvas').getContext('2d');
  for(let j=0;j<N;j++) if(G.done[j]){ const p=pathOf(j); strokePath(c,p.pts,p.pts.length-1,PC[j%12]); }
}

/* ═══ 탭 전환 ═══ */
function switchGame(g){
  $('game-ladder').style.display = g==='ladder'?'':'none';
  $('game-lots').style.display   = g==='lots'?'':'none';
  $('game-gacha').style.display  = g==='gacha'?'':'none';
  $('tabbtn-ladder').classList.toggle('on', g==='ladder');
  $('tabbtn-lots').classList.toggle('on', g==='lots');
  $('tabbtn-gacha').classList.toggle('on', g==='gacha');
  if(g==='ladder' && !busy) repaint();
}

/* ═══ 제비뽑기 ═══ */
let JN=4, JW=1, jbPhase='setup', JB=null;
function jbSetN(d){
  if(jbPhase!=='setup') return;
  JN=Math.min(12, Math.max(2, JN+d));
  JW=Math.min(JW, JN-1);
  $('jb-n').textContent=JN; $('jb-w').textContent=JW;
}
function jbSetW(d){
  if(jbPhase!=='setup') return;
  JW=Math.min(JN-1, Math.max(1, JW+d));
  $('jb-w').textContent=JW;
}
function jbHint(){
  const left=JB.results.filter((r,i)=>r==='win'&&!JB.done[i]).length;
  const rem=JB.done.filter(d=>!d).length;
  $('jb-hint').textContent='남은 제비 '+rem+'개 · 남은 당첨 '+left+'개 ✦';
}
function jbStart(){
  if(jbPhase!=='setup') return;
  const arr=Array(JN).fill('lose'); for(let i=0;i<JW;i++) arr[i]='win';
  for(let i=arr.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [arr[i],arr[j]]=[arr[j],arr[i]]; }
  JB={results:arr, done:Array(JN).fill(false)};
  jbPhase='play';
  $('jb-start').style.display='none'; $('jb-reset').style.display=''; $('jb-all').style.display='';
  $('jb-log').innerHTML='';
  $('jb-stage').style.display='flex';
  const box=$('jb-sticks'); box.innerHTML='';
  for(let i=0;i<JN;i++){
    const win=JB.results[i]==='win';
    const b=document.createElement('button');
    b.className='jb-stick'; b.type='button'; b.id='jb-stick-'+i;
    b.style.setProperty('--rot', (Math.random()*4-2).toFixed(1)+'deg');
    b.style.animationDelay=(i*0.05)+'s';
    b.innerHTML='<span class="bar"></span><span class="cap"><img src="'+AV+'" alt=""></span><i class="no">'+(i+1)+'</i>'
      +'<span class="tip '+(win?'win':'lose')+'"></span>';
    b.onclick=()=>jbPull(i,false);
    box.appendChild(b);
  }
  jbHint();
}
function jbPull(i, instant){
  if(jbPhase!=='play'||!JB||JB.done[i]) return;
  JB.done[i]=true;
  const win=JB.results[i]==='win';
  const st=$('jb-stick-'+i); st.onclick=null;
  function pullOut(){
    st.classList.add('out');
    if(win) st.querySelector('.cap').insertAdjacentHTML('beforeend','<span class="win-b">🎁</span>');
    if(!instant){
      const t=$('jb-toast');
      t.className='jb-toast show '+(win?'win':'lose');
      t.textContent=(i+1)+'번 제비  →  '+(win?'당첨 🎁':'꽝 🌙');
      clearTimeout(window.__jbToastT);
      window.__jbToastT=setTimeout(()=>t.classList.remove('show'), 1700);
    }
    const log=document.createElement('div');
    log.textContent=(i+1)+'번 제비  →  '+(win?'당첨 🎁':'꽝');
    log.style.borderLeft='4.5px solid '+(win?'#E0A93B':'#A8ADEE');
    $('jb-log').appendChild(log);
    jbHint();
    if(win && !instant && typeof window.fxHearts==='function'){
      setTimeout(()=>{
        const r=st.getBoundingClientRect();
        window.fxHearts(r.left+r.width/2, r.bottom-30, 10);
      }, 820);
    }
  }
  if(instant){ pullOut(); return; }
  st.classList.add('wig');
  setTimeout(()=>{ st.classList.remove('wig'); pullOut(); }, 310);
}
function jbRevealAll(){
  if(jbPhase!=='play'||!JB) return;
  for(let i=0;i<JN;i++) jbPull(i,true);
}
function jbReset(){
  jbPhase='setup'; JB=null;
  $('jb-sticks').innerHTML=''; $('jb-log').innerHTML=''; $('jb-stage').style.display='none';
  const _t=$('jb-toast'); if(_t) _t.classList.remove('show');
  $('jb-start').style.display=''; $('jb-reset').style.display='none'; $('jb-all').style.display='none';
  $('jb-hint').textContent='제비 개수와 당첨 개수를 정하고 시작하기! 막대를 눌러 뽑아보세요 ✦';
}

/* ═══ 뽑기(가챠) ═══ */
const CAPS=[
  {full:'../ball_n.png',  top:'../ball_n_top.png',  bot:'../ball_n_bot.png',  w:320, h:325},
  {full:'../ball_r.png',  top:'../ball_r_top.png',  bot:'../ball_r_bot.png',  w:320, h:342},
  {full:'../ball_sr.png', top:'../ball_sr_top.png', bot:'../ball_sr_bot.png', w:320, h:361}
];
const GNAMES=['일반','고급','희귀'];
let gcPhase='setup', GC=null, gcBusy=false;
function gcHint(){
  if(!GC){ $('gc-hint').textContent=''; return; }
  const c=[0,0,0]; GC.pool.forEach(g=>c[g]++);
  $('gc-hint').textContent='남은 뽑기알 '+GC.pool.length+'개 (일반 '+c[0]+' · 고급 '+c[1]+' · 희귀 '+c[2]+') — 레버를 돌려보세요!';
}
function gcStart(){
  if(gcPhase!=='setup') return;
  const cnt=[0,1,2].map(i=>Math.max(0, Math.min(50, parseInt($('gc-c'+i).value)||0)));
  const total=cnt[0]+cnt[1]+cnt[2];
  if(total<1){ $('gc-hint').textContent='❗ 뽑기알을 1개 이상 넣어주세요'; return; }
  if(total>50){ $('gc-hint').textContent='❗ 합계는 최대 50개까지예요'; return; }
  const prizes=[0,1,2].map(i=>($('gc-p'+i).value.trim() || (i===0?'꽝':'당첨 🎁')));
  const pool=[];
  cnt.forEach((n,g)=>{ for(let k=0;k<n;k++) pool.push(g); });
  for(let i=pool.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [pool[i],pool[j]]=[pool[j],pool[i]]; }
  GC={pool, prizes, drawn:0};
  gcPhase='play'; gcBusy=false;
  $('gc-grades').classList.add('lock');
  $('gc-start').style.display='none'; $('gc-reset').style.display='';
  $('gc-log').innerHTML=''; $('gc-stage').style.display='flex';
  const k=$('gc-knob'); if(k) k.disabled=false;
  gcHint();
}
function gcReset(){
  gcPhase='setup'; GC=null; gcBusy=false;
  $('gc-grades').classList.remove('lock');
  $('gc-stage').style.display='none'; $('gc-ballwrap').innerHTML='';
  $('gc-start').style.display=''; $('gc-reset').style.display='none';
  $('gc-log').innerHTML=''; $('gc-hint').textContent='';
  const k=$('gc-knob'); if(k) k.disabled=false;
}
function gcSpin(){
  if(gcPhase!=='play'||!GC||gcBusy||!GC.pool.length) return;
  gcBusy=true;
  $('gc-ballwrap').innerHTML='';
  const gr=GC.pool.pop();
  GC.drawn++;
  const design=CAPS[gr];
  const label=GC.prizes[gr].replace(/</g,'&lt;');
  const knob=$('gc-knob'); knob.classList.remove('spin'); void knob.offsetWidth; knob.classList.add('spin');
  const mach=document.querySelector('.gc-machine'); mach.classList.remove('shake'); void mach.offsetWidth; mach.classList.add('shake');
  setTimeout(()=>{
    const wrap=$('gc-ballwrap');
    const ball=document.createElement('div');
    ball.className='gc-ball pop';
    ball.innerHTML='<img class="full" src="'+design.full+'" width="100%" alt="">';
    wrap.appendChild(ball);
    setTimeout(()=>{
      ball.classList.remove('pop'); ball.classList.add('grow');
      ball.style.transform='translateX(-50%) translateY(34px) scale(.9)';
      requestAnimationFrame(()=>{
        const st=$('gc-stage').getBoundingClientRect();
        ball.style.left='50%'; ball.style.bottom=Math.round(st.height*0.32)+'px';
        ball.style.width='190px';
        ball.style.transform='translateX(-50%) translateY(0) scale(1)';
      });
      setTimeout(()=>{
        const ratio=design.h/design.w;
        ball.innerHTML=
          '<div style="position:relative; width:100%; padding-top:'+(ratio*100)+'%;">'
          +'<img class="half h-top" src="'+design.top+'" alt="">'
          +'<img class="half h-bot" src="'+design.bot+'" alt="">'
          +'<div class="prize g'+gr+'"><span class="pt">'+label+'</span></div>'
          +'</div>';
        requestAnimationFrame(()=>requestAnimationFrame(()=>ball.classList.add('open')));
        const log=document.createElement('div');
        log.textContent=GC.drawn+'번째 뽑기  →  ['+GNAMES[gr]+'] '+GC.prizes[gr];
        log.style.borderLeft='4.5px solid '+(gr===2?'#E0A93B':gr===1?'#6A6FE0':'#A8ADEE');
        $('gc-log').appendChild(log);
        gcHint();
        if(!GC.pool.length){ $('gc-hint').textContent='뽑기알을 전부 뽑았어요! ↺ 다시하기로 새 판 ✦'; $('gc-knob').disabled=true; }
        if(gr>0 && typeof window.fxHearts==='function'){
          setTimeout(()=>{
            const r=ball.getBoundingClientRect();
            window.fxHearts(r.left+r.width/2, r.top+r.height/2, gr===2?12:7);
          }, 550);
        }
        ball.onclick=()=>{ ball.remove(); };
        setTimeout(()=>{ gcBusy=false; }, 900);
      }, 850);
    }, 720);
  }, 620);
}

window.addEventListener('resize', ()=>{ if(!busy) repaint(); });
document.addEventListener('DOMContentLoaded', ()=>{
  document.body.classList.add('ready');
  renderSetup();
  const sw=$('themeSwitch');
  if(sw) sw.addEventListener('click', ()=>setTimeout(()=>{ if(!busy) repaint(); }, 60));
});
setTimeout(()=>document.body.classList.add('ready'), 1200);
</script>
<script>
(function(){
  var sw=document.getElementById('themeSwitch'), knob=document.getElementById('themeKnob');
  function refresh(){ if(knob) knob.textContent=document.body.classList.contains('dark')?'☀️':'🌙'; }
  if(sw) sw.addEventListener('click', function(){
    document.body.classList.toggle('dark');
    localStorage.setItem('theme', document.body.classList.contains('dark')?'dark':'light');
    refresh();
  });
  refresh();
})();
</script>
<script src="../fx.js"></script>
